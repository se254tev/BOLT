name: bolt_marketplace
description: A production-ready Flutter marketplace application with buyer, seller, and admin workflows.
publish_to: none
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  state_notifier: ^1.0.0
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  go_router: ^7.1.1
  dio: ^5.4.0
  socket_io_client: ^2.0.2
  dio_cookie_manager: ^3.0.0
  cookie_jar: ^4.0.0
  flutter_secure_storage: ^10.3.1
  firebase_messaging: ^16.3.0
  image_picker: ^1.1.0
  cached_network_image: ^3.2.3
  url_launcher: ^6.1.10
  uuid: ^4.5.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
