name: bolt_marketplace
description: A production-ready Flutter marketplace application with buyer, seller, and admin workflows.
publish_to: none
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_riverpod: ^2.3.0
  go_router: ^7.1.0
  dio: ^6.1.0
  dio_cookie_manager: ^3.0.0
  cookie_jar: ^3.0.1
  flutter_secure_storage: ^9.0.0
  firebase_messaging: ^14.2.0
  image_picker: ^1.1.0
  cached_network_image: ^3.2.3
  uuid: ^3.0.7
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
